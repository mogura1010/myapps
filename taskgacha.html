<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="タスクガチャ">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#6c4ad6">
<title>タスク達成ガチャ</title>
<style>
  :root{
    --bg:#f4f3ef; --surface:#ffffff; --text:#222; --muted:#6b6b6b;
    --border:#e2e1da; --accent:#6c4ad6; --accent-d:#553aac; --soft:#efeaff;
    --track:#ece9e1; --ok:#1f7a44; --danger:#b53030;
    --n:#9a9a93; --r:#3781d8; --sr:#9a4ad6; --ssr:#e8a417;
  }
  @media (prefers-color-scheme: dark){
    :root{
      --bg:#1c1c1a; --surface:#262624; --text:#f2f1ec; --muted:#a3a39c;
      --border:#3a3a37; --accent:#9b7df0; --accent-d:#7d5fe0; --soft:#2c2640;
      --track:#33332f; --ok:#7fd6a0; --danger:#f0a0a0;
      --n:#7d7d76; --r:#5b9be8; --sr:#b06ae8; --ssr:#f0bf4a;
    }
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Hiragino Sans","Noto Sans JP",sans-serif;background:var(--bg);color:var(--text);line-height:1.6;padding:env(safe-area-inset-top) env(safe-area-inset-right) calc(env(safe-area-inset-bottom) + 70px) env(safe-area-inset-left);}
  .wrap{max-width:680px;margin:0 auto;padding:16px 14px 24px;}
  .topbar{display:flex;align-items:center;justify-content:space-between;gap:10px;margin:4px 0 16px;}
  .brand{display:flex;align-items:center;gap:9px;font-size:18px;font-weight:600;}
  .brand .ic{width:34px;height:34px;border-radius:9px;background:var(--accent);color:#fff;display:flex;align-items:center;justify-content:center;font-size:18px;}
  .pts{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:7px 14px;font-weight:600;font-size:16px;display:flex;align-items:center;gap:6px;white-space:nowrap;}
  .pts .label{font-size:11px;color:var(--muted);font-weight:500;}
  .card-box{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:18px 16px;margin-bottom:16px;}
  h2{font-size:16px;font-weight:600;margin:0 0 12px;display:flex;align-items:center;gap:7px;}
  .muted{color:var(--muted);font-size:13px;}
  .task{display:flex;align-items:center;gap:10px;padding:11px 0;border-bottom:1px solid var(--border);}
  .task:last-child{border-bottom:none;}
  .task .name{flex:1;font-size:15px;}
  .task .pt{font-size:13px;color:var(--accent);font-weight:600;white-space:nowrap;}
  .btn{font:inherit;cursor:pointer;border-radius:10px;border:1.5px solid var(--border);background:var(--surface);color:var(--text);padding:8px 14px;font-size:14px;transition:transform .05s,background .15s,opacity .15s;}
  .btn:active{transform:scale(.96);}
  .btn.primary{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:600;}
  .btn.mini{padding:6px 11px;font-size:13px;}
  .btn.done{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:600;}
  .btn.del{border-color:transparent;color:var(--muted);padding:6px 8px;}
  .add-row{display:flex;gap:8px;margin-top:14px;}
  .add-row input{font:inherit;flex:1;min-width:0;padding:9px 12px;border:1.5px solid var(--border);border-radius:10px;background:var(--bg);color:var(--text);font-size:15px;}
  .add-row input.pt-in{flex:0 0 78px;}
  .toast{position:fixed;left:50%;bottom:84px;transform:translateX(-50%) translateY(20px);background:var(--accent-d);color:#fff;padding:10px 18px;border-radius:999px;font-size:14px;font-weight:600;opacity:0;pointer-events:none;transition:.25s;z-index:120;}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
  .gacha-zone{text-align:center;padding:6px 0 4px;}
  .gacha-cost{font-size:13px;color:var(--muted);margin:0 0 12px;}
  .gacha-btn{font:inherit;cursor:pointer;border:none;border-radius:16px;color:#fff;font-weight:700;font-size:18px;padding:16px 30px;background:linear-gradient(135deg,#7d5fe0,#b06ae8);box-shadow:0 6px 18px rgba(108,74,214,.35);transition:transform .08s,opacity .15s;}
  .gacha-btn:active{transform:scale(.95);}
  .gacha-btn:disabled{opacity:.4;cursor:not-allowed;box-shadow:none;}
  .overlay{position:fixed;inset:0;background:rgba(10,8,20,.86);display:none;align-items:center;justify-content:center;z-index:100;padding:20px;}
  .overlay.show{display:flex;}
  .reveal{text-align:center;max-width:440px;width:100%;}
  .orb{width:120px;height:120px;border-radius:50%;margin:0 auto;background:radial-gradient(circle at 35% 30%,#fff,#b06ae8 45%,#553aac);box-shadow:0 0 40px rgba(176,106,232,.8);animation:pulse 1s ease-in-out infinite;}
  @keyframes pulse{0%,100%{transform:scale(1);}50%{transform:scale(1.15);}}
  .reveal .hint{color:#e8e2ff;margin-top:18px;font-size:15px;letter-spacing:.1em;}
  .bigcard{border-radius:18px;padding:8px;position:relative;animation:flipin .6s cubic-bezier(.2,.8,.3,1);}
  @keyframes flipin{0%{transform:rotateY(90deg) scale(.8);opacity:0;}100%{transform:rotateY(0) scale(1);opacity:1;}}
  .bigcard img{width:100%;border-radius:12px;display:block;}
  .bigcard .cap{color:#fff;text-align:center;padding:8px 4px 2px;}
  .bigcard .cap .rare{font-size:13px;font-weight:700;letter-spacing:.15em;}
  .bigcard .cap .place{font-size:15px;font-weight:600;}
  .bigcard.N{background:linear-gradient(150deg,#9a9a93,#6f6f68);}
  .bigcard.R{background:linear-gradient(150deg,#4f97ec,#2566b8);}
  .bigcard.SR{background:linear-gradient(150deg,#b06ae8,#7a30c0);box-shadow:0 0 26px rgba(176,106,232,.6);}
  .bigcard.SSR{background:linear-gradient(135deg,#f0a417,#e85cc0 40%,#5b9be8 70%,#3ad6c0);background-size:300% 300%;animation:flipin .6s cubic-bezier(.2,.8,.3,1),holo 3s ease infinite;box-shadow:0 0 36px rgba(240,164,23,.7);}
  @keyframes holo{0%{background-position:0% 50%;}50%{background-position:100% 50%;}100%{background-position:0% 50%;}}
  .reveal .tap-close{color:#e8e2ff;margin-top:16px;font-size:13px;}
  .new-badge{display:inline-block;background:#ffd23f;color:#5a4500;font-size:11px;font-weight:700;padding:2px 8px;border-radius:999px;margin-bottom:6px;}
  .dupe-badge{display:inline-block;background:rgba(255,255,255,.25);color:#fff;font-size:11px;font-weight:600;padding:2px 8px;border-radius:999px;margin-bottom:6px;}
  .summary{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;}
  .chip{flex:1;min-width:62px;background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:8px 4px;text-align:center;}
  .chip .num{font-size:18px;font-weight:700;}
  .chip .lab{font-size:11px;color:var(--muted);font-weight:600;}
  .chip.N .num{color:var(--n);} .chip.R .num{color:var(--r);}
  .chip.SR .num{color:var(--sr);} .chip.SSR .num{color:var(--ssr);}
  .prog{font-size:13px;color:var(--muted);text-align:center;margin:0 0 14px;}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:11px;}
  .mini{aspect-ratio:3/4;border-radius:11px;overflow:hidden;position:relative;cursor:pointer;border:2px solid transparent;}
  .mini img{width:100%;height:100%;object-fit:cover;display:block;}
  .mini.N{border-color:var(--n);} .mini.R{border-color:var(--r);}
  .mini.SR{border-color:var(--sr);} .mini.SSR{border-color:var(--ssr);}
  .mini .cnt{position:absolute;right:3px;bottom:3px;background:rgba(0,0,0,.7);color:#fff;font-size:10px;font-weight:700;padding:1px 6px;border-radius:999px;}
  .mini.locked{background:var(--track);display:flex;align-items:center;justify-content:center;border-color:var(--border);}
  .mini.locked .q{font-size:30px;color:var(--muted);}
  .data-actions{display:flex;flex-wrap:wrap;gap:8px;}
  .memo-box{background:var(--surface);border-radius:16px;padding:20px 18px;max-width:360px;width:100%;}
  .log-sum{display:flex;align-items:baseline;gap:10px;}
  .log-sum-pt{font-size:28px;font-weight:700;color:var(--accent);}
  .log-bytask{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px;}
  .log-tag{background:var(--bg);border:1px solid var(--border);border-radius:999px;padding:3px 10px;font-size:12px;color:var(--text);}
  .log-row{display:flex;gap:10px;padding:10px 0;border-bottom:1px solid var(--border);}
  .log-row:last-child{border-bottom:none;}
  .log-time{font-size:12px;color:var(--muted);font-variant-numeric:tabular-nums;padding-top:2px;min-width:38px;}
  .log-body{flex:1;}
  .log-name{font-size:14px;}
  .log-pt{color:var(--accent);font-weight:600;font-size:12px;}
  .log-memo{font-size:13px;color:var(--muted);margin-top:2px;}
  .tabbar{position:fixed;left:0;right:0;bottom:0;background:var(--surface);border-top:1px solid var(--border);display:flex;padding:6px 4px calc(6px + env(safe-area-inset-bottom));z-index:40;}
  .tabbar button{flex:1;background:none;border:none;color:var(--muted);font:inherit;font-size:11px;display:flex;flex-direction:column;align-items:center;gap:2px;padding:5px 0;cursor:pointer;}
  .tabbar button.active{color:var(--accent);font-weight:600;}
  .page{display:none;} .page.active{display:block;}
  .hidden{display:none;}
</style>
</head>
<body>
<div class="wrap">
  <div class="topbar">
    <div class="brand"><span class="ic">🎴</span>タスク達成ガチャ</div>
    <div class="pts"><span class="label">所持pt</span><span id="pts-val">0</span></div>
  </div>
  <div id="page-task" class="page active">
    <div class="card-box">
      <h2>📋 今日のタスク</h2>
      <p class="muted" style="margin-top:-6px;">完了するとポイントが貯まります。同じタスクは何度でも完了OK。</p>
      <div id="task-list"></div>
      <div class="add-row">
        <input id="new-task" type="text" placeholder="新しいタスク名" maxlength="40">
        <input id="new-pt" class="pt-in" type="number" placeholder="pt" min="1" max="999" value="20">
        <button class="btn primary mini" id="add-task">追加</button>
      </div>
    </div>
  </div>
  <div id="page-gacha" class="page">
    <div class="card-box">
      <h2>🎰 ガチャを引く</h2>
      <div class="gacha-zone">
        <p class="gacha-cost">1回 <b id="cost-val">100</b> pt ／ 所持 <b id="pts-val2">0</b> pt</p>
        <button class="gacha-btn" id="gacha-btn">ガチャを引く！</button>
        <p class="muted" id="gacha-note" style="margin-top:14px;">ポイントが足りません。タスクを完了して貯めよう。</p>
      </div>
    </div>
    <div class="card-box">
      <h2>✨ 排出確率</h2>
      <p class="muted" style="margin:0;">N 60％ ／ R 27％ ／ SR 10％ ／ <b style="color:var(--ssr)">SSR 3％</b><br>全18種のカードを集めよう！</p>
    </div>
  </div>
  <div id="page-coll" class="page">
    <div class="card-box">
      <h2>🗂 コレクション</h2>
      <p class="prog" id="prog"></p>
      <div class="summary" id="summary"></div>
      <div id="grid" class="grid"></div>
    </div>
  </div>
  <div id="page-data" class="page">
    <div class="card-box">
      <h2>💾 データ管理</h2>
      <p class="muted" style="margin-top:-6px;">データは端末内に自動保存されます。別端末へ移すにはバックアップを使ってください（OneDrive等に保存）。</p>
      <div class="data-actions">
        <button class="btn" id="export-btn">📤 バックアップを書き出す</button>
        <button class="btn" id="import-btn">📥 バックアップを読み込む</button>
        <button class="btn" id="reset-btn" style="color:var(--danger);">🗑 データをリセット</button>
      </div>
      <input id="import-file" type="file" accept="application/json,.json" class="hidden">
      <p class="muted" id="stat-line" style="margin-bottom:0;margin-top:14px;"></p>
    </div>
  </div>

  <div id="page-log" class="page">
    <div class="card-box">
      <h2>📒 活動ログ</h2>
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:14px;">
        <span class="muted">表示する日</span>
        <select id="log-day-sel" style="flex:1;font:inherit;padding:7px 10px;border:1.5px solid var(--border);border-radius:10px;background:var(--bg);color:var(--text);font-size:14px;"></select>
      </div>
      <div id="log-summary"></div>
      <div id="log-list" style="margin-top:14px;"></div>
    </div>
  </div>
</div>
<div id="overlay" class="overlay"><div class="reveal" id="reveal-inner"></div></div>

<div id="memo-overlay" class="overlay">
  <div class="memo-box">
    <h3 style="margin:0 0 4px;font-size:17px;font-weight:600;">タスク完了</h3>
    <p id="memo-task" style="margin:0 0 12px;color:var(--accent);font-weight:600;font-size:14px;"></p>
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:14px;">
      <label style="font-size:14px;color:var(--muted);white-space:nowrap;">回数</label>
      <input id="memo-count" type="number" min="1" max="20" value="1" style="width:72px;font:inherit;padding:7px 10px;border:1.5px solid var(--border);border-radius:10px;background:var(--bg);color:var(--text);font-size:16px;font-weight:600;text-align:center;">
      <span id="memo-pt-preview" style="font-size:13px;color:var(--muted);"></span>
    </div>
    <p class="muted" style="margin:0 0 6px;">メモ（任意・空欄でもOK）</p>
    <textarea id="memo-input" rows="3" placeholder="例：○○社の設定問題に対応" style="width:100%;font:inherit;padding:10px 12px;border:1.5px solid var(--border);border-radius:10px;background:var(--bg);color:var(--text);font-size:15px;resize:vertical;"></textarea>
    <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:14px;">
      <button class="btn" id="memo-cancel">キャンセル</button>
      <button class="btn primary" id="memo-ok">完了して記録</button>
    </div>
  </div>
</div>

<div id="toast" class="toast"></div>
<div class="tabbar">
  <button data-page="task" class="active"><span style="font-size:21px">📋</span>タスク</button>
  <button data-page="gacha"><span style="font-size:21px">🎰</span>ガチャ</button>
  <button data-page="coll"><span style="font-size:21px">🗂</span>コレクション</button>
  <button data-page="log"><span style="font-size:21px">📒</span>ログ</button>
  <button data-page="data"><span style="font-size:21px">💾</span>データ</button>
</div>

<script>
"use strict";
const COST=100;
const RATES=[["N",0.60],["R",0.27],["SR",0.10],["SSR",0.03]];
const KEY="taskGachaData_v2";
const POOL=window.CARD_POOL||[];
const byRarity={N:[],R:[],SR:[],SSR:[]};
POOL.forEach(c=>{ if(byRarity[c.rarity]) byRarity[c.rarity].push(c); });

let data=load();
function defaults(){
  return { points:0,
    tasks:[
      {id:uid(),name:"新規ケースを1件対応",pt:20},
      {id:uid(),name:"継続ケースに返信",pt:10},
      {id:uid(),name:"資料・ドキュメント作成",pt:50},
      {id:uid(),name:"OJTケースのフィードバック（1件）",pt:20},
      {id:uid(),name:"会議に参加（1回）",pt:30},
      {id:uid(),name:"学習・調査 10分",pt:10},
      {id:uid(),name:"学習・調査 20分",pt:20},
      {id:uid(),name:"学習・調査 30分",pt:30}
    ],
    owned:{}, totalDraws:0, log:[] };
}
function uid(){ return Math.random().toString(36).slice(2,9); }
function load(){ try{const d=JSON.parse(localStorage.getItem(KEY)); if(d&&d.tasks&&d.owned){ if(!Array.isArray(d.log)) d.log=[]; return d; } }catch(e){} return defaults(); }
function save(){ try{localStorage.setItem(KEY,JSON.stringify(data));}catch(e){} }
const $=id=>document.getElementById(id);
function toast(m){const t=$("toast");t.textContent=m;t.classList.add("show");clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove("show"),1700);}

function renderPoints(){
  $("pts-val").textContent=data.points; $("pts-val2").textContent=data.points; $("cost-val").textContent=COST;
  const can=data.points>=COST;
  $("gacha-btn").disabled=!can; $("gacha-note").style.display=can?"none":"block";
}
function renderTasks(){
  const box=$("task-list"); box.innerHTML="";
  data.tasks.forEach(t=>{
    const row=document.createElement("div"); row.className="task";
    row.innerHTML='<span class="name"></span><span class="pt">+'+t.pt+'pt</span>';
    row.querySelector(".name").textContent=t.name;
    const done=document.createElement("button"); done.className="btn done mini"; done.textContent="完了";
    done.onclick=()=>openMemo(t);
    const del=document.createElement("button"); del.className="btn del"; del.textContent="✕"; del.title="削除";
    del.onclick=()=>{ if(!confirm("「"+t.name+"」を削除しますか？")) return; data.tasks=data.tasks.filter(x=>x.id!==t.id); save(); renderTasks(); };
    row.appendChild(done); row.appendChild(del); box.appendChild(row);
  });
  if(data.tasks.length===0) box.innerHTML='<p class="muted" style="padding:14px 0;text-align:center;">タスクがありません。下から追加してください。</p>';
}
$("add-task").onclick=()=>{
  const name=$("new-task").value.trim(); const pt=parseInt($("new-pt").value,10);
  if(!name){toast("タスク名を入力してください");return;}
  if(!pt||pt<1){toast("ポイントは1以上で");return;}
  data.tasks.push({id:uid(),name,pt}); save(); renderTasks(); $("new-task").value=""; $("new-pt").value="20";
};
$("new-task").addEventListener("keydown",e=>{ if(e.key==="Enter") $("add-task").click(); });

function pad2(n){ return (n<10?"0":"")+n; }
function dateKey(d){ return d.getFullYear()+"-"+pad2(d.getMonth()+1)+"-"+pad2(d.getDate()); }
function nowParts(){ const d=new Date(); return {day:dateKey(d), time:pad2(d.getHours())+":"+pad2(d.getMinutes()), ts:d.getTime()}; }

let pendingTask=null;
function updatePtPreview(){
  if(!pendingTask) return;
  const n=Math.max(1,parseInt($("memo-count").value)||1);
  $("memo-pt-preview").textContent="= +"+(pendingTask.pt*n)+"pt";
}
function openMemo(t){
  pendingTask=t;
  $("memo-task").textContent=t.name+"（1回 +"+t.pt+"pt）";
  $("memo-count").value=1;
  $("memo-input").value="";
  updatePtPreview();
  $("memo-overlay").classList.add("show");
  setTimeout(()=>$("memo-count").select(),50);
}
function closeMemo(){ $("memo-overlay").classList.remove("show"); pendingTask=null; }
function confirmComplete(){
  if(!pendingTask) return;
  const t=pendingTask;
  const count=Math.max(1,Math.min(20,parseInt($("memo-count").value)||1));
  const memo=$("memo-input").value.trim();
  const np=nowParts();
  const totalPt=t.pt*count;
  data.points+=totalPt;
  for(let i=0;i<count;i++){
    data.log.push({ts:np.ts+i, day:np.day, time:np.time, name:t.name, pt:t.pt, memo:i===0?memo:""});
  }
  pruneLog();
  save(); renderPoints();
  closeMemo();
  toast("+"+ totalPt +"pt 獲得！"+(count>1?" (×"+count+")":""));
}
function pruneLog(){
  const cutoff=Date.now()-365*24*60*60*1000;
  data.log=data.log.filter(e=>e.ts>=cutoff);
}

function drawRarity(){ const r=Math.random(); let c=0; for(const x of RATES){c+=x[1]; if(r<c)return x[0];} return RATES[RATES.length-1][0]; }
function pick(a){ return a[Math.floor(Math.random()*a.length)]; }

$("gacha-btn").onclick=()=>{
  if(data.points<COST) return;
  let rarity=drawRarity();
  if(!byRarity[rarity]||byRarity[rarity].length===0){ rarity="N"; }
  const card=pick(byRarity[rarity]);
  data.points-=COST; data.totalDraws++;
  const isNew=!data.owned[card.id];
  data.owned[card.id]=(data.owned[card.id]||0)+1;
  save(); renderPoints();
  playGacha(card,isNew,data.owned[card.id]);
};
function playGacha(card,isNew,count){
  const ov=$("overlay"), inner=$("reveal-inner");
  ov.classList.add("show");
  inner.innerHTML='<div class="orb"></div><div class="hint">引いています…</div>';
  setTimeout(()=>{
    const badge=isNew?'<div class="new-badge">NEW!</div>':'<div class="dupe-badge">所持 '+count+'枚</div>';
    inner.innerHTML=badge+
      '<div class="bigcard '+card.rarity+'"><img src="'+card.img+'" alt="card">'+
      '<div class="cap"><div class="rare">'+card.rarity+'</div><div class="place">'+card.place+'</div></div></div>'+
      '<div class="tap-close">タップして閉じる</div>';
    if(card.rarity==="SSR") toast("✨ SSR 出ました！おめでとう！");
    else if(isNew) toast("新しいカード獲得！");
  },1100);
}
$("overlay").onclick=()=>{ if($("reveal-inner").querySelector(".bigcard")){ $("overlay").classList.remove("show"); renderCollection(); } };

function renderCollection(){
  const counts={N:0,R:0,SR:0,SSR:0}; let ownedKinds=0;
  POOL.forEach(c=>{ if(data.owned[c.id]){ ownedKinds++; } });
  ["N","R","SR","SSR"].forEach(r=>{ counts[r]=byRarity[r].filter(c=>data.owned[c.id]).length; });
  $("prog").textContent="コンプリート "+ownedKinds+" / "+POOL.length+" 種";
  const sum=$("summary"); sum.innerHTML="";
  ["N","R","SR","SSR"].forEach(r=>{
    const total=byRarity[r].length;
    const ch=document.createElement("div"); ch.className="chip "+r;
    ch.innerHTML='<div class="num">'+counts[r]+'/'+total+'</div><div class="lab">'+r+'</div>';
    sum.appendChild(ch);
  });
  const grid=$("grid"); grid.innerHTML="";
  POOL.forEach(c=>{
    const owned=data.owned[c.id];
    const el=document.createElement("div");
    if(owned){
      el.className="mini "+c.rarity;
      el.innerHTML='<img src="'+c.img+'" alt="">'+(owned>1?'<span class="cnt">×'+owned+'</span>':'');
      el.onclick=()=>showDetail(c,owned);
    }else{
      el.className="mini locked"; el.innerHTML='<span class="q">？</span>';
    }
    grid.appendChild(el);
  });
}
function showDetail(card,count){
  const ov=$("overlay"), inner=$("reveal-inner");
  ov.classList.add("show");
  inner.innerHTML='<div class="dupe-badge">所持 '+count+'枚</div>'+
    '<div class="bigcard '+card.rarity+'"><img src="'+card.img+'" alt="card">'+
    '<div class="cap"><div class="rare">'+card.rarity+'</div><div class="place">'+card.place+'</div></div></div>'+
    '<div class="tap-close">タップして閉じる</div>';
}
function renderStats(){
  const total=Object.values(data.owned).reduce((a,b)=>a+b,0);
  const kinds=POOL.filter(c=>data.owned[c.id]).length;
  $("stat-line").textContent="累計ガチャ "+data.totalDraws+" 回 ／ 所持カード "+total+" 枚 ／ コンプ "+kinds+"/"+POOL.length+" 種";
}
let logViewDay=null; // null=今日
function renderLog(){
  const days=[...new Set(data.log.map(e=>e.day))].sort().reverse();
  const today=dateKey(new Date());
  if(logViewDay===null) logViewDay=today;
  // 日付セレクタ
  const sel=$("log-day-sel"); sel.innerHTML="";
  const allDays = days.includes(today)?days:[today,...days];
  allDays.forEach(d=>{
    const o=document.createElement("option"); o.value=d;
    o.textContent=(d===today?"今日 ":"")+d; if(d===logViewDay)o.selected=true;
    sel.appendChild(o);
  });
  const items=data.log.filter(e=>e.day===logViewDay).sort((a,b)=>b.ts-a.ts);
  // サマリー
  const totalPt=items.reduce((a,b)=>a+b.pt,0);
  const byTask={};
  items.forEach(e=>{ byTask[e.name]=(byTask[e.name]||0)+1; });
  let sumHtml='<div class="log-sum"><div class="log-sum-pt">'+totalPt+' pt</div><div class="muted">'+items.length+' 件完了</div></div>';
  if(items.length){
    sumHtml+='<div class="log-bytask">';
    Object.keys(byTask).forEach(n=>{ sumHtml+='<span class="log-tag">'+escapeHtml(n)+' ×'+byTask[n]+'</span>'; });
    sumHtml+='</div>';
  }
  $("log-summary").innerHTML=sumHtml;
  // 一覧
  const list=$("log-list");
  if(!items.length){ list.innerHTML='<p class="muted" style="text-align:center;padding:18px 0;">この日の記録はありません。</p>'; return; }
  list.innerHTML="";
  items.forEach(e=>{
    const row=document.createElement("div"); row.className="log-row";
    row.innerHTML='<div class="log-time">'+e.time+'</div>'+
      '<div class="log-body"><div class="log-name">'+escapeHtml(e.name)+' <span class="log-pt">+'+e.pt+'pt</span></div>'+
      (e.memo?'<div class="log-memo">'+escapeHtml(e.memo)+'</div>':'')+'</div>';
    list.appendChild(row);
  });
}
function escapeHtml(s){ return String(s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c])); }
$("export-btn").onclick=()=>{
  const blob=new Blob([JSON.stringify(data,null,2)],{type:"application/json"});
  const url=URL.createObjectURL(blob); const a=document.createElement("a");
  a.href=url; a.download="taskgacha-backup.json"; document.body.appendChild(a); a.click(); a.remove(); URL.revokeObjectURL(url);
  toast("バックアップを書き出しました");
};
$("import-btn").onclick=()=>$("import-file").click();
$("import-file").onchange=(e)=>{
  const f=e.target.files[0]; if(!f)return;
  const r=new FileReader();
  r.onload=()=>{ try{ const d=JSON.parse(r.result); if(!d||!Array.isArray(d.tasks)||typeof d.owned!=="object")throw 0; data=d; if(!data.owned)data.owned={}; if(!Array.isArray(data.log))data.log=[]; save(); renderAll(); toast("バックアップを読み込みました"); }catch(err){ toast("読み込み失敗: ファイル形式を確認"); } e.target.value=""; };
  r.readAsText(f);
};
$("reset-btn").onclick=()=>{ if(confirm("すべてのデータ（ポイント・カード・タスク）を初期化します。よろしいですか？")){ data=defaults(); save(); renderAll(); toast("データをリセットしました"); } };
document.querySelectorAll(".tabbar button").forEach(btn=>{
  btn.onclick=()=>{
    document.querySelectorAll(".tabbar button").forEach(b=>b.classList.remove("active"));
    document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
    btn.classList.add("active"); $("page-"+btn.dataset.page).classList.add("active");
    if(btn.dataset.page==="coll") renderCollection();
    if(btn.dataset.page==="data") renderStats();
    if(btn.dataset.page==="log") renderLog();
  };
});
$("memo-ok").onclick=confirmComplete;
$("memo-cancel").onclick=closeMemo;
$("memo-count").addEventListener("input",updatePtPreview);
$("memo-input").addEventListener("keydown",e=>{ if(e.key==="Enter"&&(e.ctrlKey||e.metaKey)) confirmComplete(); });
$("log-day-sel").onchange=(e)=>{ logViewDay=e.target.value; renderLog(); };
function renderAll(){ renderPoints(); renderTasks(); renderCollection(); renderStats(); }
renderAll();
</script>
</body>
</html>
